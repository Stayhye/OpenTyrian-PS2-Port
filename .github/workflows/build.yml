name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit && ./setup.sh

      - name: Build SDL and Ports
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          git clone --recursive https://github.com/ps2dev/ps2sdk-ports.git
          cd ps2sdk-ports

          # Build Core Dependencies
          cd sdl && make && make install && cd ..
          cd libmad && make && make install && cd ..
          cd audsrv && make && make install && cd ..

          # Build SDL_mixer using case-insensitive search
          MIXER_DIR=$(find . -maxdepth 1 -type d -iname "*sdl_mixer*")
          cd "$MIXER_DIR"
          if [ -f "Makefile" ]; then
            make && make install
          elif [ -d "ee" ]; then
            cd ee && make && make install
          fi

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Ensure the obj directory is clean for the runner
          rm -rf obj
          mkdir -p obj
          
          # Build using your provided Makefile.ps2
          # Your Makefile handles the src/ to obj/ mapping automatically
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
