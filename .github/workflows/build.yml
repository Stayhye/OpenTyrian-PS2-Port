name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit
          ./setup.sh
          # We manually point to the install dir if setup.sh doesn't
          make install

      - name: Build SDL and Ports
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Clone the ports repository
          git clone https://github.com/ps2dev/ps2sdk-ports.git
          
          # We need SDL, SDL_mixer, and SDL_image
          # Note: We build them one by one to ensure dependencies are met
          cd ps2sdk-ports/sdl
          make && make install
          
          # If OpenTyrian needs audio/images, we do these too:
          cd ../sdl_mixer
          make && make install
          cd ../sdl_image
          make && make install

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Clean and Build
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
