name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # The ps2dev image uses Alpine's apk. 
          # We need to install the portlib packages specifically for the PS2.
          apk add --no-cache build-base git
          
          # Install the specific PS2 ports needed for OpenTyrian
          # These are usually prefixed with 'ps2-' in the ps2dev environment
          apk add --no-cache \
            ps2-sdk \
            ps2-ps2sdk-ports \
            ps2-libmad \
            ps2-sdl \
            ps2-sdl_mixer \
            ps2-sdl_image

      - name: Compile project
        run: |
          # Set the SDK variables just in case they aren't inherited
          export PS2SDK=/usr/local/ps2dev/ps2sdk
          export PATH=$PATH:$PS2SDK/bin
          
          # OpenTyrian Makefile usually expects these
          make clean
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTyrian-PS2-Build
          path: |
            *.elf
            *.ELF
          if-no-files-found: error
