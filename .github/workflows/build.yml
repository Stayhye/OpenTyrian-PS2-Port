name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment and Dependencies
        run: |
          # 1. Ensure the PS2DEV binaries are in the path
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2DEV/dvp/bin:$PS2SDK/bin
          
          # 2. Install basic build tools
          apk add --no-cache build-base git bash
          
          # 3. Use the absolute path to ps2-portlibs to avoid 'not found'
          # We check if the script exists first, then run it.
          $PS2DEV/bin/ps2-portlibs install sdl
          $PS2DEV/bin/ps2-portlibs install sdl_mixer
          $PS2DEV/bin/ps2-portlibs install sdl_image
          $PS2DEV/bin/ps2-portlibs install libmad

      - name: Compile project
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2DEV/dvp/bin:$PS2SDK/bin
          
          # Build logic for Stayhye's port
          if [ -f "Makefile.ps2" ]; then
            make -f Makefile.ps2
          else
            make
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTyrian-PS2-Build
          path: |
            **/*.elf
            **/*.ELF
