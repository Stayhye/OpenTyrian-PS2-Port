name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build and Install gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit && ./setup.sh

      - name: Build SDL and Ports
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          git clone --recursive https://github.com/ps2dev/ps2sdk-ports.git
          cd ps2sdk-ports

          # 1. Build SDL Base
          cd sdl && make && make install && cd ..

          # 2. Build libmad
          cd libmad && make && make install && cd ..
          
          # 3. Build audsrv
          cd audsrv && make && make install && cd ..

          # 4. Build SDL_mixer
          MIXER_DIR=$(find . -maxdepth 1 -type d -iname "*sdl_mixer*")
          cd "$MIXER_DIR"
          if [ -f "Makefile" ]; then make && make install; elif [ -d "ee" ]; then cd ee && make && make install; fi
          cd ..

          # 5. Build SDL_image (Added to prevent potential link errors)
          IMAGE_DIR=$(find . -maxdepth 1 -type d -iname "*sdl_image*")
          cd "$IMAGE_DIR"
          if [ -f "Makefile" ]; then make && make install; elif [ -d "ee" ]; then cd ee && make && make install; fi

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Manually create the obj directory to prevent the Fatal Error
          mkdir -p obj
          
          # Clean and Build
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
