name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit && ./setup.sh

      - name: Build SDL and Mixer
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          git clone https://github.com/ps2dev/ps2sdk-ports.git
          cd ps2sdk-ports

          # 1. Build SDL Base
          cd $(find . -maxdepth 2 -type d -iname "sdl") && make && make install
          cd /__w/OpenTyrian-PS2-Port/OpenTyrian-PS2-Port/ps2sdk-ports

          # 2. Build libmad (Dependency for Mixer)
          cd $(find . -maxdepth 2 -type d -iname "libmad") && make && make install
          cd /__w/OpenTyrian-PS2-Port/OpenTyrian-PS2-Port/ps2sdk-ports

          # 3. Build SDL_mixer
          cd $(find . -maxdepth 2 -type d -iname "sdl_mixer") && make && make install

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Clean and Build
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
