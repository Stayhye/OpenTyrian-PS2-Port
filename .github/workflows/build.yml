name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build and Install gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit && ./setup.sh

      - name: Build SDL and Mixer
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          git clone https://github.com/ps2dev/ps2sdk-ports.git
          cd ps2sdk-ports

          # 1. Build SDL Base
          echo "Building SDL..."
          cd sdl && make && make install
          cd ..

          # 2. Build libmad
          echo "Building libmad..."
          cd libmad && make && make install
          cd ..

          # 3. Build SDL_mixer
          # We check for both possible folder names
          echo "Building SDL_mixer..."
          if [ -d "sdl_mixer" ]; then cd sdl_mixer; else cd SDL_mixer; fi
          
          # If there is a Makefile here, run it. If not, check the 'ee' folder.
          if [ -f "Makefile" ]; then
            make && make install
          elif [ -d "ee" ]; then
            cd ee && make && make install
          else
            echo "Searching for Makefile in $(pwd)..."
            find . -name "Makefile"
            exit 1
          fi

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Build OpenTyrian
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
