name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: apk add --no-cache build-base git bash cmake

      - name: Build gsKit
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          git clone https://github.com/ps2dev/gsKit.git
          cd gsKit && ./setup.sh

      - name: Build SDL and Ports
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Use --recursive to pull the actual source for SDL_mixer/SDL_image
          git clone --recursive https://github.com/ps2dev/ps2sdk-ports.git
          cd ps2sdk-ports

          # 1. Build SDL Base
          cd sdl && make && make install && cd ..

          # 2. Build libmad (Dependency for Mixer)
          cd libmad && make && make install && cd ..
          
          # 3. Build audsrv (Required for OpenTyrian audio)
          cd audsrv && make && make install && cd ..

          # 4. Build SDL_mixer
          # Use case-insensitive search to find the folder regardless of naming
          MIXER_DIR=$(find . -maxdepth 1 -type d -iname "*sdl_mixer*")
          echo "Found Mixer directory: $MIXER_DIR"
          cd "$MIXER_DIR"
          
          # Check for Makefile in root or 'ee' subfolder
          if [ -f "Makefile" ]; then
            make && make install
          elif [ -d "ee" ]; then
            cd ee && make && make install
          fi

      - name: Compile OpenTyrian
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Clean and Build
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
