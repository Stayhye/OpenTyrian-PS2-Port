name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'Dockerfile' # Don't trigger game build if we are only changing the env

jobs:
  build-game:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/opentyrian-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile OpenTyrian
        run: |
          # Use bin2c from the custom image to embed IRX files
          bin2c $PS2SDK/iop/irx/usbd.irx src/usbd_irx.c usbd_irx
          bin2c $PS2SDK/iop/irx/bdm.irx src/bdm_irx.c bdm_irx
          bin2c $PS2SDK/iop/irx/bdmfs_fatfs.irx src/bdmfs_fatfs_irx.c bdmfs_fatfs_irx
          bin2c $PS2SDK/iop/irx/usbmass_bd.irx src/usbmass_bd_irx.c usbmass_bd_irx
          bin2c $PS2SDK/iop/irx/sio2man.irx src/sio2man_irx.c sio2man_irx
          bin2c $PS2SDK/iop/irx/padman.irx src/padman_irx.c padman_irx
          
          mkdir -p obj
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
