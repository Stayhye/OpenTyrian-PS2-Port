name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # 1. Add the modern repo
          echo "https://apk-repo.ps2dev.org" >> /etc/apk/repositories
          apk update
          
          # 2. Install the specific packages your Makefile needs
          # Note: gskit and sdl are essential for this specific port
          apk add --no-cache \
            build-base \
            git \
            ps2-gsKit \
            ps2-libsdl \
            ps2-ps2sdk-ports

      - name: Compile OpenTyrian
        run: |
          # Set up environment variables required by Makefile.pref
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export GSKIT=$PS2DEV/gsKit
          export PATH=$PATH:$PS2DEV/bin:$PS2SDK/bin
          
          # Use the specific Makefile you provided
          make -f Makefile.ps2 clean
          make -f Makefile.ps2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentyrian-ps2-elf
          path: opentyrian.elf
