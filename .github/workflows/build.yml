name: Build OpenTyrian PS2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # 1. Update the local package manager for basic tools
          apk add --no-cache build-base git bash wget
          
          # 2. Use the built-in ps2-portlibs if available, or fetch the latest
          # We will try to install the specific libraries required for Tyrian
          # OpenTyrian needs SDL, SDL_mixer, and SDL_image
          # Note: 'ps2-portlibs' is an internal tool of the ps2dev environment
          
          ps2-portlibs install sdl
          ps2-portlibs install sdl_mixer
          ps2-portlibs install sdl_image
          ps2-portlibs install libmad

      - name: Compile project
        run: |
          # Some repos have a 'ps2' subdirectory, others use a specific Makefile
          # We'll try to find the right one.
          if [ -f "Makefile.ps2" ]; then
            make -f Makefile.ps2
          elif [ -d "ps2" ]; then
            cd ps2 && make
          else
            make
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTyrian-PS2-Build
          path: |
            **/*.elf
            **/*.ELF
          if-no-files-found: error
